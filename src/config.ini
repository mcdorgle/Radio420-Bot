#############################################
# Radio420 Bot Configuration File (Template)
# Fill out values and save before running.
#############################################

[twitch]
# Twitch bot username (lowercase)
nick = YOUR_TWITCH_USERNAME

# Twitch channel to join (no # symbol)
channel = YOUR_CHANNEL_NAME

# OAuth Token (Generate here: https://twitchapps.com/tmi/)
# Format: oauth:xxxxxxxxxxxxxxxxxxxxxx
oauth = oauth:YOUR_TOKEN_HERE


[database]
# RadioDJ MySQL/MariaDB credentials
host = 127.0.0.1
user = DB_USER
password = DB_PASSWORD
db = radiodj


[server]
# Overlay host and port
host = 0.0.0.0
port = 8080


[overlay]
# Number of requests to show in OBS overlay
max_results = 5


[style]
# Overlay appearance
background = #000000
text_color = #FFEB3B
title_color = #FFC107
font_size = 20
refresh_rate = 5
